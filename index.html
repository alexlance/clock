<!DOCTYPE html>
<html>
  <head>
    <link rel="StyleSheet" href="/style.css" type="text/css" media="screen" />
    <script src="/hls.js"></script>
    <script src="/init.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <span class="time"></span>
        <span class="current"></span>
        <span class="day"></span>
        <span class="date"></span>
        <span class="weatherdesc"></span>
        <span class="weathericon"></span>
        <span class="weathernow"><span class="weathericon"></span></span>
        <span class="weatherrain"></span>
        <span class="weathertomor"></span>

        <div class="radio">
          <button id="playPause">Radio off</button>
          <audio id="radio"></audio>
        </div>

      </div>
      <div class="right">
        <img class="weather">
      </div>


    </div>
  </body>
</html>
